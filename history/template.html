<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="交易历史记录 - 按时间倒序展示的图片瀑布流">
    <title>交易历史记录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="white" opacity="0.03"/><circle cx="75" cy="75" r="1" fill="white" opacity="0.03"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 15px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.3), 0 2px 4px rgba(0,0,0,0.2);
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.95;
            font-weight: 300;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        /* 瀑布流布局 - 使用 CSS Multi-column */
        .gallery {
            column-count: 1;
            column-gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 所有设备统一显示单列 */

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15),
                        0 4px 10px rgba(0, 0, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeInUp 0.6s ease-out backwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .gallery-item:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2),
                        0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .gallery-item a {
            display: block;
            text-decoration: none;
            color: inherit;
        }

        .item-info {
            padding: 25px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .item-info::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="10" cy="10" r="1.5" fill="white" opacity="0.1"/></pattern></defs><rect width="100" height="100" fill="url(%23dots)"/></svg>');
            pointer-events: none;
        }

        .item-date {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
            position: relative;
            z-index: 1;
            flex: 1;
        }

        .item-date::before {
            content: '📊';
            margin-right: 12px;
            font-size: 1.6rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .blog-link-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 20px;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 1;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4);
        }

        .blog-link-btn:hover {
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 20px rgba(240, 147, 251, 0.6);
        }

        .blog-link-btn:active {
            transform: translateY(0) scale(1.02);
        }

        .blog-link-btn::before {
            content: '📖';
            margin-right: 6px;
            font-size: 0.95rem;
        }

        .item-label {
            display: none; /* 隐藏标签，保持简洁 */
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 35.4%; /* 匹配实际图片尺寸 1442×510 的比例 */
            overflow: hidden;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .image-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.05) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .image-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .gallery-item:hover .image-wrapper img {
            transform: scale(1.05);
        }

        /* Lightbox 样式 */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            z-index: 1001;
            transition: color 0.3s ease;
        }

        .lightbox-close:hover {
            color: #667eea;
        }

        .lightbox-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 8px;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 60px;
            padding: 30px 20px;
            opacity: 0.95;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        footer p {
            font-size: 1.1rem;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        footer p::before {
            content: '✨ ';
        }

        footer p::after {
            content: ' ✨';
        }

        /* 懒加载相关样式 */
        .gallery-item.hidden {
            display: none;
        }

        .loading-more {
            text-align: center;
            padding: 40px 20px;
            color: white;
            font-size: 1.2rem;
            display: none;
        }

        .loading-more.active {
            display: block;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }

        .loading-more::before {
            content: '⏳ ';
            margin-right: 8px;
        }

        /* 回到顶部按钮 */
        .back-to-top {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
            border: 3px solid rgba(255, 255, 255, 0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 999;
            opacity: 0;
            transform: translateY(20px);
        }

        .back-to-top.visible {
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }

        .back-to-top:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 12px 30px rgba(102, 126, 234, 0.6);
        }

        .back-to-top:active {
            transform: translateY(-2px) scale(1.05);
        }

        .back-to-top::before {
            content: '↑';
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        /* 移动端优化 */
        @media (max-width: 768px) {
            .back-to-top {
                bottom: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
            }

            .back-to-top::before {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>交易历史记录</h1>
            <p class="subtitle">记录每一笔交易的成长历程</p>
        </header>

        <div class="gallery">
            {% for item in items %}
            <div class="gallery-item {% if loop.index0 >= 10 %}hidden{% endif %}" data-index="{{ loop.index0 }}">
                <div class="item-info">
                    <div class="item-date">{{ item.date }}</div>
                    <a href="{{ item.blog_url }}" target="_blank" class="blog-link-btn" title="查看详细分析">查看</a>
                </div>
                <a href="{{ item.full_image_url }}" target="_blank" onclick="openLightbox(event, '{{ item.full_image_url }}', '{{ item.date }}')">
                    <div class="image-wrapper">
                        <img src="{{ item.image_url }}" alt="{{ item.date }}" loading="lazy">
                    </div>
                </a>
            </div>
            {% endfor %}
        </div>

        <div class="loading-more" id="loading-more">加载更多记录...</div>

        <footer>
            <p>共 {{ items|length }} 条记录，已显示 <span id="shown-count">10</span> 条</p>
        </footer>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightbox-image" src="" alt="">
        <div class="lightbox-info" id="lightbox-info"></div>
    </div>

    <!-- 回到顶部按钮 -->
    <div class="back-to-top" id="back-to-top" title="回到顶部"></div>

    <script>
        // 懒加载配置
        const ITEMS_PER_PAGE = 10;
        let currentPage = 1;
        let isLoading = false;
        let hasMoreItems = true;

        // 打开 Lightbox
        function openLightbox(event, imageUrl, date) {
            event.preventDefault();
            const lightbox = document.getElementById('lightbox');
            const lightboxImage = document.getElementById('lightbox-image');
            const lightboxInfo = document.getElementById('lightbox-info');

            lightboxImage.src = imageUrl;
            lightboxInfo.textContent = date;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // 关闭 Lightbox
        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // ESC 键关闭 Lightbox
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeLightbox();
            }
        });

        // 加载更多项目
        function loadMoreItems() {
            if (isLoading || !hasMoreItems) {
                return;
            }

            isLoading = true;
            const loadingMore = document.getElementById('loading-more');
            loadingMore.classList.add('active');

            // 模拟加载延迟（可选，提升用户体验）
            setTimeout(() => {
                const hiddenItems = document.querySelectorAll('.gallery-item.hidden');
                const itemsToShow = Array.from(hiddenItems).slice(0, ITEMS_PER_PAGE);

                if (itemsToShow.length === 0) {
                    hasMoreItems = false;
                    loadingMore.textContent = '已加载全部记录';
                    setTimeout(() => {
                        loadingMore.classList.remove('active');
                    }, 2000);
                    isLoading = false;
                    return;
                }

                // 显示新项目
                itemsToShow.forEach((item, index) => {
                    setTimeout(() => {
                        item.classList.remove('hidden');
                    }, index * 100); // 依次显示，带动画效果
                });

                currentPage++;
                const shownCount = Math.min(currentPage * ITEMS_PER_PAGE, {{ items|length }});
                document.getElementById('shown-count').textContent = shownCount;

                // 检查是否还有更多
                const remainingHidden = document.querySelectorAll('.gallery-item.hidden').length;
                if (remainingHidden === 0) {
                    hasMoreItems = false;
                    loadingMore.textContent = '已加载全部记录';
                    setTimeout(() => {
                        loadingMore.classList.remove('active');
                    }, 2000);
                } else {
                    loadingMore.classList.remove('active');
                }

                isLoading = false;
            }, 500);
        }

        // 检测滚动到底部
        function checkScroll() {
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const windowHeight = window.innerHeight;
            const documentHeight = document.documentElement.scrollHeight;

            // 当滚动到距离底部 200px 时触发加载
            if (scrollTop + windowHeight >= documentHeight - 200) {
                loadMoreItems();
            }

            // 控制回到顶部按钮的显示/隐藏
            const backToTop = document.getElementById('back-to-top');
            if (scrollTop > 300) {
                backToTop.classList.add('visible');
            } else {
                backToTop.classList.remove('visible');
            }
        }

        // 回到顶部功能
        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }

        // 绑定回到顶部按钮点击事件
        document.addEventListener('DOMContentLoaded', function() {
            const backToTop = document.getElementById('back-to-top');
            backToTop.addEventListener('click', scrollToTop);
        });

        // 添加滚动监听（使用节流优化性能）
        let scrollTimer = null;
        window.addEventListener('scroll', function() {
            if (scrollTimer) {
                return;
            }
            scrollTimer = setTimeout(() => {
                checkScroll();
                scrollTimer = null;
            }, 100);
        });

        // 页面加载完成后检查是否需要显示"加载更多"按钮
        document.addEventListener('DOMContentLoaded', function() {
            const totalItems = {{ items|length }};
            if (totalItems <= ITEMS_PER_PAGE) {
                hasMoreItems = false;
            } else {
                // 显示加载更多提示
                const loadingMore = document.getElementById('loading-more');
                loadingMore.textContent = '↓ 向下滚动加载更多 ↓';
                loadingMore.classList.add('active');

                // 3秒后隐藏提示
                setTimeout(() => {
                    loadingMore.classList.remove('active');
                }, 3000);
            }
        });
    </script>
</body>
</html>
