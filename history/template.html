<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="交易历史记录 - 按时间倒序展示的图片瀑布流">
    <title>交易历史记录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8eef5 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 300;
            margin-bottom: 12px;
            letter-spacing: 2px;
            color: #1a1a1a;
            position: relative;
            display: inline-block;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #667eea, transparent);
            border-radius: 2px;
        }

        .subtitle {
            font-size: 1rem;
            color: #9ca3af;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin-top: 16px;
        }

        /* 瀑布流布局 - 使用 CSS Multi-column */
        .gallery {
            column-count: 1;
            column-gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 所有设备统一显示单列 */

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 40px;
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08),
                        0 8px 40px rgba(0, 0, 0, 0.04);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .gallery-item:hover {
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.12),
                        0 8px 24px rgba(0, 0, 0, 0.08);
            transform: translateY(-8px) scale(1.01);
        }

        .gallery-item a {
            display: block;
            text-decoration: none;
            color: inherit;
        }

        .item-info {
            padding: 20px 24px;
            background: linear-gradient(135deg, #fafbfc 0%, #ffffff 100%);
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .item-date {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1a1a1a;
            letter-spacing: 0.5px;
            flex: 1;
        }

        .blog-link-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .blog-link-btn:hover {
            background: linear-gradient(135deg, #7b8ff0 0%, #8a5cb8 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .blog-link-btn:active {
            transform: translateY(0);
        }

        .item-label {
            display: none; /* 隐藏标签，保持简洁 */
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 35.4%;
            overflow: hidden;
            background: #f0f2f5;
            border-radius: 0 0 16px 16px;
        }

        .image-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 移除图片悬停放大效果 */


        /* Lightbox 样式 */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.90);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 36px;
            cursor: pointer;
            z-index: 1001;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .lightbox-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1rem;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 16px;
            border-radius: 4px;
        }

        footer {
            text-align: center;
            color: #9ca3af;
            margin-top: 60px;
            padding: 30px 20px;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
        }

        footer p {
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        /* 回到顶部按钮 */
        .back-to-top {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 999;
            opacity: 0;
        }

        .back-to-top.visible {
            display: flex;
            opacity: 1;
        }

        .back-to-top:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
        }

        .back-to-top:active {
            transform: translateY(-2px);
        }

        .back-to-top::before {
            content: '↑';
            font-size: 26px;
            font-weight: 300;
            color: white;
            letter-spacing: -2px;
        }

        /* 侧边栏导航 */
        .sidebar-nav {
            position: fixed;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            display: none;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 16px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .sidebar-nav.visible {
            display: block;
        }

        .nav-item {
            padding: 1px 0;
            text-align: right;
            position: relative;
        }

        .nav-link {
            color: #6b7280;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            padding: 6px 12px;
            display: inline-block;
            position: relative;
            border-radius: 6px;
        }

        .nav-link:hover {
            color: #667eea;
            background: rgba(102, 126, 234, 0.08);
        }

        .nav-link.active {
            color: #667eea;
            font-weight: 600;
            background: rgba(102, 126, 234, 0.12);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: height 0.3s ease;
            border-radius: 2px;
        }

        .nav-link.active::after {
            height: 20px;
        }

        /* 年份导航 */
        .year-nav {
            margin-bottom: 1px;
        }

        .year-link {
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 400;
            padding-right: 14px;
        }

        .year-link::before {
            display: none;
        }

        /* 月份导航 */
        .month-nav {
            padding-left: 12px;
            margin-top: 1px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .month-nav-item {
            padding: 1px 0;
        }

        .month-link {
            font-size: 0.8rem;
            padding: 4px 10px;
            color: #9ca3af;
        }

        .month-link:hover {
            color: #667eea;
        }

        .month-link.active {
            color: #667eea;
            font-weight: 600;
        }

        /* 移动端优化 */
        @media (max-width: 768px) {
            .back-to-top {
                bottom: 20px;
                right: 20px;
                width: 45px;
                height: 45px;
            }

            .back-to-top::before {
                font-size: 20px;
            }

            .sidebar-nav {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>交易历史记录</h1>
            <p class="subtitle">记录每一笔交易的成长历程</p>
        </header>

        <div class="gallery">
            {% for item in items %}
            <div class="gallery-item" data-index="{{ loop.index0 }}" data-year="{{ item.year }}" data-month="{{ item.month }}" {% if item.is_first_in_month %}id="month-{{ item.year }}-{{ item.month }}"{% elif item.is_first_in_year %}id="year-{{ item.year }}"{% endif %}>
                <div class="item-info">
                    <div class="item-date">{{ item.date }}</div>
                    <a href="{{ item.blog_url }}" target="_blank" class="blog-link-btn" title="查看详细分析">查看原文</a>
                </div>
                <a href="{{ item.full_image_url }}" target="_blank" onclick="openLightbox(event, '{{ item.full_image_url }}', '{{ item.date }}')">
                    <div class="image-wrapper">
                        <img src="{{ item.image_url }}" alt="{{ item.date }}" loading="lazy">
                    </div>
                </a>
            </div>
            {% endfor %}
        </div>

        <!-- 侧边栏导航 -->
        <nav class="sidebar-nav" id="sidebar-nav">
            {% for year in years %}
            <div class="nav-item year-nav">
                <a href="#year-{{ year }}" class="nav-link year-link" data-year="{{ year }}">{{ year }}</a>
                <div class="month-nav" id="month-nav-{{ year }}" style="display: none;">
                    {% for month in year_months[year] %}
                    <div class="nav-item month-nav-item">
                        <a href="#month-{{ year }}-{{ month }}" class="nav-link month-link" data-year="{{ year }}" data-month="{{ month }}">{{ month }}月</a>
                    </div>
                    {% endfor %}
                </div>
            </div>
            {% endfor %}
        </nav>

        <footer>
            <p>共 {{ items|length }} 条记录</p>
        </footer>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightbox-image" src="" alt="">
        <div class="lightbox-info" id="lightbox-info"></div>
    </div>

    <!-- 回到顶部按钮 -->
    <div class="back-to-top" id="back-to-top" title="回到顶部"></div>

    <script>
        // 打开 Lightbox
        function openLightbox(event, imageUrl, date) {
            event.preventDefault();
            const lightbox = document.getElementById('lightbox');
            const lightboxImage = document.getElementById('lightbox-image');
            const lightboxInfo = document.getElementById('lightbox-info');

            lightboxImage.src = imageUrl;
            lightboxInfo.textContent = date;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // 关闭 Lightbox
        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // ESC 键关闭 Lightbox
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeLightbox();
            }
        });

        // 检测滚动位置（用于回到顶部按钮）
        function checkScroll() {
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;

            // 控制回到顶部按钮的显示/隐藏
            const backToTop = document.getElementById('back-to-top');
            if (scrollTop > 300) {
                backToTop.classList.add('visible');
            } else {
                backToTop.classList.remove('visible');
            }
        }

        // 回到顶部功能
        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }

        // 绑定回到顶部按钮点击事件
        document.addEventListener('DOMContentLoaded', function() {
            const backToTop = document.getElementById('back-to-top');
            backToTop.addEventListener('click', scrollToTop);
        });

        // 添加滚动监听（使用节流优化性能）
        let scrollTimer = null;
        window.addEventListener('scroll', function() {
            if (scrollTimer) {
                return;
            }
            scrollTimer = setTimeout(() => {
                checkScroll();
                scrollTimer = null;
            }, 100);
        });

        // 页面加载完成后初始化侧边栏导航
        document.addEventListener('DOMContentLoaded', function() {
            initSidebarNav();
        });

        // 侧边栏导航功能
        function initSidebarNav() {
            const sidebarNav = document.getElementById('sidebar-nav');
            const galleryItems = document.querySelectorAll('.gallery-item');
            const years = new Set();

            // 为每年的第一条记录添加ID
            galleryItems.forEach(item => {
                const year = item.getAttribute('data-year');
                if (year && !years.has(year)) {
                    years.add(year);
                    // 不在这里设置ID，因为已经在模板中设置了
                }
            });

            // 如果有多个年份，显示侧边栏
            if (years.size > 0) {
                sidebarNav.classList.add('visible');
            }

            // 绑定年份链接点击事件 - 展开/折叠月份并滚动到该年份
            const yearLinks = document.querySelectorAll('.year-link');
            yearLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    const year = this.getAttribute('data-year');
                    const monthNav = document.getElementById('month-nav-' + year);
                    const isExpanded = this.classList.contains('expanded');

                    // 如果当前是折叠状态，先收起其他所有年份
                    if (!isExpanded) {
                        yearLinks.forEach(otherLink => {
                            if (otherLink !== this) {
                                const otherYear = otherLink.getAttribute('data-year');
                                const otherMonthNav = document.getElementById('month-nav-' + otherYear);
                                otherMonthNav.style.display = 'none';
                                otherLink.classList.remove('expanded');
                            }
                        });
                    }

                    // 切换当前年份的月份导航显示
                    if (monthNav.style.display === 'none' || !monthNav.style.display) {
                        monthNav.style.display = 'block';
                        this.classList.add('expanded');
                    } else {
                        monthNav.style.display = 'none';
                        this.classList.remove('expanded');
                    }

                    // 滚动到该年份的第一个item
                    const firstMonthInYear = monthNav.querySelector('.month-link');
                    if (firstMonthInYear) {
                        const targetId = firstMonthInYear.getAttribute('href').substring(1);
                        const targetElement = document.getElementById(targetId);
                        if (targetElement) {
                            const offset = 100;
                            const targetPosition = targetElement.getBoundingClientRect().top + window.pageYOffset - offset;
                            window.scrollTo({
                                top: targetPosition,
                                behavior: 'smooth'
                            });
                        }
                    }
                });
            });

            // 绑定月份链接点击事件 - 滚动到对应月份
            const monthLinks = document.querySelectorAll('.month-link');
            monthLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    const targetId = this.getAttribute('href').substring(1);
                    const targetElement = document.getElementById(targetId);

                    if (targetElement) {
                        const offset = 100;
                        const targetPosition = targetElement.getBoundingClientRect().top + window.pageYOffset - offset;
                        window.scrollTo({
                            top: targetPosition,
                            behavior: 'smooth'
                        });
                    }
                });
            });
        }

        // 更新侧边栏高亮
        function updateSidebarNav() {
            const yearLinks = document.querySelectorAll('.year-link');
            const monthLinks = document.querySelectorAll('.month-link');
            const galleryItems = document.querySelectorAll('.gallery-item');

            let currentYear = null;
            let currentMonth = null;
            const scrollTop = window.pageYOffset + 200;

            for (let item of galleryItems) {
                const itemTop = item.offsetTop;
                if (scrollTop >= itemTop) {
                    currentYear = item.getAttribute('data-year');
                    currentMonth = item.getAttribute('data-month');
                }
            }

            // 更新年份链接高亮
            yearLinks.forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('data-year') === currentYear) {
                    link.classList.add('active');
                }
            });

            // 更新月份链接高亮
            monthLinks.forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('data-year') === currentYear &&
                    link.getAttribute('data-month') === currentMonth) {
                    link.classList.add('active');
                }
            });
        }

        // 在checkScroll函数中添加更新侧边栏
        const originalCheckScroll = checkScroll;
        checkScroll = function() {
            originalCheckScroll();
            updateSidebarNav();
        };
    </script>
</body>
</html>
