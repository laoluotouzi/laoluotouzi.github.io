{% extends "base.html" %}

{% block title %}标签: {{ tag.name }} - 老罗投资{% endblock %}

{% block content %}
<div class="tag-page">
    <h1 class="page-title">标签: {{ tag.name }}</h1>
    <div class="post-list">
        {% for post in posts %}
        <article class="post-card">
            <div class="post-card-body">
                <h2 class="post-card-title">
                    <a href="{{ post.url }}">{{ post.title }}</a>
                </h2>
                <time class="post-card-date" datetime="{{ post.date.isoformat() }}">
                    {{ post.date.strftime('%Y-%m-%d') }}
                </time>
            </div>
        </article>
        {% endfor %}
    </div>
</div>
{% endblock %}
